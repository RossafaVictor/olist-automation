name: Olist - Baixar Custos e Enviar para Google Sheets

on:
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês/Ano (MM/AAAA) — deixe vazio para o mês atual'
        required: false
        default: ''

jobs:
  baixar-e-upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --dns-result-order=ipv4first
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependências
        working-directory: scripts
        run: npm install

      - name: Instalar navegadores Playwright
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Definir mês alvo
        id: mes
        run: |
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            echo "valor=${{ github.event.inputs.mes }}" >> $GITHUB_OUTPUT
          else
            echo "valor=$(date +'%m/%Y')" >> $GITHUB_OUTPUT
          fi

      - name: Diagnóstico Google OAuth
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "=== Node.js version ==="
          node --version
          echo "=== window definido? ==="
          node -e "console.log('typeof window:', typeof window); console.log('window.fetch?', typeof globalThis.fetch);"
          echo "=== Teste Node.js https.request direto ==="
          node -e "
          const https = require('https');
          const req = https.request('https://oauth2.googleapis.com/token', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'}
          }, (res) => {
            let d = '';
            res.on('data', c => d += c);
            res.on('end', () => console.log('OK HTTP', res.statusCode, d.slice(0,60)));
            res.on('error', e => console.log('BODY ERR', e.message));
          });
          req.on('error', e => console.log('REQ ERR', e.message));
          req.write('grant_type=test&assertion=test');
          req.end();
          " || true

      - name: Baixar relatório Olist
        working-directory: scripts
        env:
          OLIST_EMAIL: ${{ secrets.OLIST_EMAIL }}
          OLIST_PASSWORD: ${{ secrets.OLIST_PASSWORD }}
        run: node baixar-custos.js "${{ steps.mes.outputs.valor }}"

      - name: Enviar para Google Sheets
        working-directory: scripts
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          MES="${{ steps.mes.outputs.valor }}"
          MES_NUM=$(echo $MES | cut -d'/' -f1)
          ANO=$(echo $MES | cut -d'/' -f2)
          MESES=("" "Janeiro" "Fevereiro" "Março" "Abril" "Maio" "Junho" "Julho" "Agosto" "Setembro" "Outubro" "Novembro" "Dezembro")
          MES_NOME="${MESES[$((10#$MES_NUM))]} $ANO"
          XLS_FILE="downloads/custos de ecommerce ${MES_NOME}.xls"
          node upload-sheets.js "${XLS_FILE}" "${MES}"

      - name: Upload screenshots de erro (se houver)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-erro
          path: /tmp/olist_*.png
