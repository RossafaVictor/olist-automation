name: Olist - Backfill Histórico (Jan/2026 até hoje)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependências
        working-directory: scripts
        run: npm install

      - name: Instalar navegadores Playwright
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Executar backfill (Jan/2026 → hoje)
        working-directory: scripts
        env:
          OLIST_EMAIL: ${{ secrets.OLIST_EMAIL }}
          OLIST_PASSWORD: ${{ secrets.OLIST_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: node backfill.js

      - name: Upload screenshots de erro (se houver)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-erro
          path: /tmp/olist_*.png
