name: Olist - Baixar Custos e Enviar para Google Sheets

on:
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês/Ano (MM/AAAA) — deixe vazio para o mês atual'
        required: false
        default: ''

jobs:
  baixar-e-upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --dns-result-order=ipv4first
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependências
        working-directory: scripts
        run: npm install

      - name: Instalar navegadores Playwright
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Definir mês alvo
        id: mes
        run: |
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            echo "valor=${{ github.event.inputs.mes }}" >> $GITHUB_OUTPUT
          else
            echo "valor=$(date +'%m/%Y')" >> $GITHUB_OUTPUT
          fi

      - name: Diagnóstico Google OAuth
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "=== Teste curl: conectividade com oauth2.googleapis.com ==="
          curl -s -o /tmp/curl_out.txt -w "HTTP_STATUS:%{http_code} TIME:%{time_total}s" \
            -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=diagnostico" || true
          cat /tmp/curl_out.txt | head -3
          echo ""
          echo "=== Credencial: tipo ==="
          echo "$GOOGLE_CREDENTIALS" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log('type:', d.type); console.log('project_id:', d.project_id); console.log('client_email:', d.client_email); console.log('key_id:', d.private_key_id);" 2>/dev/null || echo "[AVISO] Falha ao ler GOOGLE_CREDENTIALS"

      - name: Baixar relatório Olist
        working-directory: scripts
        env:
          OLIST_EMAIL: ${{ secrets.OLIST_EMAIL }}
          OLIST_PASSWORD: ${{ secrets.OLIST_PASSWORD }}
        run: node baixar-custos.js "${{ steps.mes.outputs.valor }}"

      - name: Enviar para Google Sheets
        working-directory: scripts
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          MES="${{ steps.mes.outputs.valor }}"
          MES_NUM=$(echo $MES | cut -d'/' -f1)
          ANO=$(echo $MES | cut -d'/' -f2)
          MESES=("" "Janeiro" "Fevereiro" "Março" "Abril" "Maio" "Junho" "Julho" "Agosto" "Setembro" "Outubro" "Novembro" "Dezembro")
          MES_NOME="${MESES[$((10#$MES_NUM))]} $ANO"
          XLS_FILE="downloads/custos de ecommerce ${MES_NOME}.xls"
          node upload-sheets.js "${XLS_FILE}" "${MES}"

      - name: Upload screenshots de erro (se houver)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-erro
          path: /tmp/olist_*.png
